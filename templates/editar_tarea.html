{% extends "base.html" %}

{% block title %}Editar Tarea - Gestor de Tareas{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8 col-lg-6">
        <div class="card shadow">
            <div class="card-header bg-warning text-dark">
                <h4 class="mb-0">
                    <i class="fas fa-edit me-2"></i>Editar Tarea
                </h4>
            </div>
            <div class="card-body">
                <form method="POST">
                    <div class="mb-3">
                        <label for="titulo" class="form-label">
                            <i class="fas fa-heading me-1"></i>Título *
                        </label>
                        <input type="text" class="form-control" id="titulo" name="titulo" 
                               value="{{ tarea.titulo }}" required maxlength="100">
                    </div>
                    
                    <div class="mb-3">
                        <label for="descripcion" class="form-label">
                            <i class="fas fa-align-left me-1"></i>Descripción
                        </label>
                        <textarea class="form-control" id="descripcion" name="descripcion" 
                                  rows="4">{{ tarea.descripcion or '' }}</textarea>
                    </div>
                    
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label for="fecha_limite" class="form-label">
                                <i class="fas fa-calendar me-1"></i>Fecha Límite
                            </label>
                            <input type="date" class="form-control" id="fecha_limite" name="fecha_limite"
                                   value="{{ tarea.fecha_limite.strftime('%Y-%m-%d') if tarea.fecha_limite else '' }}">
                        </div>
                        
                        <div class="col-md-6 mb-3">
                            <label for="prioridad" class="form-label">
                                <i class="fas fa-exclamation-triangle me-1"></i>Prioridad
                            </label>
                            <select class="form-select" id="prioridad" name="prioridad">
                                <option value="baja" {{ 'selected' if tarea.prioridad == 'baja' else '' }}>Baja</option>
                                <option value="media" {{ 'selected' if tarea.prioridad == 'media' else '' }}>Media</option>
                                <option value="alta" {{ 'selected' if tarea.prioridad == 'alta' else '' }}>Alta</option>
                            </select>
                        </div>
                    </div>
                    
                    <div class="mb-3">
                        <div class="form-check">
                            <input class="form-check-input" type="checkbox" id="completada" 
                                   {{ 'checked' if tarea.completada else '' }} disabled>
                            <label class="form-check-label" for="completada">
                                Tarea completada
                            </label>
                        </div>
                        <small class="text-muted">
                            <i class="fas fa-info-circle me-1"></i>
                            Para cambiar el estado de la tarea, usa el checkbox en la página principal.
                        </small>
                    </div>
                    
                    <div class="d-flex gap-2">
                        <button type="submit" class="btn btn-warning">
                            <i class="fas fa-save me-1"></i>Actualizar Tarea
                        </button>
                        <a href="{{ url_for('index') }}" class="btn btn-outline-secondary">
                            <i class="fas fa-times me-1"></i>Cancelar
                        </a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
document.addEventListener('DOMContentLoaded', function() {
    // Auto-resize textarea
    const textarea = document.getElementById('descripcion');
    textarea.addEventListener('input', function() {
        this.style.height = 'auto';
        this.style.height = this.scrollHeight + 'px';
    });
    
    // Trigger initial resize
    textarea.style.height = 'auto';
    textarea.style.height = textarea.scrollHeight + 'px';
});
</script>
{% endblock %}

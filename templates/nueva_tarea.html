{% extends "base.html" %}

{% block title %}Nueva Tarea - Gestor de Tareas{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8 col-lg-6">
        <div class="card shadow">
            <div class="card-header bg-primary text-white">
                <h4 class="mb-0">
                    <i class="fas fa-plus me-2"></i>Nueva Tarea
                </h4>
            </div>
            <div class="card-body">
                <form method="POST">
                    <div class="mb-3">
                        <label for="titulo" class="form-label">
                            <i class="fas fa-heading me-1"></i>Título *
                        </label>
                        <input type="text" class="form-control" id="titulo" name="titulo" 
                               required maxlength="100" placeholder="Ingresa el título de la tarea">
                    </div>
                    
                    <div class="mb-3">
                        <label for="descripcion" class="form-label">
                            <i class="fas fa-align-left me-1"></i>Descripción
                        </label>
                        <textarea class="form-control" id="descripcion" name="descripcion" 
                                  rows="4" placeholder="Describe los detalles de la tarea (opcional)"></textarea>
                    </div>
                    
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label for="fecha_limite" class="form-label">
                                <i class="fas fa-calendar me-1"></i>Fecha Límite
                            </label>
                            <input type="date" class="form-control" id="fecha_limite" name="fecha_limite">
                        </div>
                        
                        <div class="col-md-6 mb-3">
                            <label for="prioridad" class="form-label">
                                <i class="fas fa-exclamation-triangle me-1"></i>Prioridad
                            </label>
                            <select class="form-select" id="prioridad" name="prioridad">
                                <option value="baja">Baja</option>
                                <option value="media" selected>Media</option>
                                <option value="alta">Alta</option>
                            </select>
                        </div>
                    </div>
                    
                    <div class="d-flex gap-2">
                        <button type="submit" class="btn btn-primary">
                            <i class="fas fa-save me-1"></i>Crear Tarea
                        </button>
                        <a href="{{ url_for('index') }}" class="btn btn-outline-secondary">
                            <i class="fas fa-times me-1"></i>Cancelar
                        </a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
document.addEventListener('DOMContentLoaded', function() {
   
    const today = new Date().toISOString().split('T')[0];
    document.getElementById('fecha_limite').min = today;
    
    const textarea = document.getElementById('descripcion');
    textarea.addEventListener('input', function() {
        this.style.height = 'auto';
        this.style.height = this.scrollHeight + 'px';
    });
});
</script>
{% endblock %}
